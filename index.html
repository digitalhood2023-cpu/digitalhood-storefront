    <style>
      #app-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #ffffff;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #app-loader img {

        height: 120px;
        object-fit: contain;

        }

          transform: scale(1.08);
